services:
  app:
    build: .
    container_name: praetorium-app
    restart: always
    ports:
      - "127.0.0.1:8100:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://praetorium:${POSTGRES_PASSWORD}@db:5432/praetorium
      - DATABASE_URL_SYNC=postgresql+psycopg2://praetorium:${POSTGRES_PASSWORD}@db:5432/praetorium
      - SECRET_KEY=${SECRET_KEY:-CHANGE-ME}
      - NC_URL=https://cloud.13thlegion.org
      - NC_CLIENT_ID=${NC_CLIENT_ID}
      - NC_CLIENT_SECRET=${NC_CLIENT_SECRET}
      - NC_API_USER=${NC_API_USER:-portal-svc}
      - NC_API_PASSWORD=${NC_API_PASSWORD}
      - APP_URL=https://portal.13thlegion.org
      - DEBUG=false
      - NC_SVC_USER=spooky
      - NC_SVC_PASS=${NC_SVC_PASS}
      - NC_PORTAL_SVC_USER=portal-svc
      - NC_PORTAL_SVC_PASS=${NC_PORTAL_SVC_PASS}
      - SMTP_HOST=172.21.0.1
      - SMTP_PORT=1025
      - SMTP_USER=admin@13thlegion.org
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=13th Legion <admin@13thlegion.org>
    depends_on:
      - db
    networks:
      - praetorium

  db:
    image: postgres:16-alpine
    container_name: praetorium-db
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: praetorium
      POSTGRES_USER: praetorium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - praetorium

volumes:
  pgdata:

networks:
  praetorium:
    driver: bridge
