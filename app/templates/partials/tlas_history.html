<table style="width: 100%; border-collapse: collapse; font-size: 14px;">
    <thead>
        <tr style="border-bottom: 2px solid #333;">
            <th style="text-align: left; padding: 8px;">Level</th>
            <th style="text-align: left; padding: 8px;">Set By</th>
            <th style="text-align: left; padding: 8px;">Date</th>
            <th style="text-align: left; padding: 8px;">Note</th>
        </tr>
    </thead>
    <tbody>
        {% for entry in history %}
        <tr style="border-bottom: 1px solid #eee;">
            <td style="padding: 8px;">
                <span style="
                    display: inline-block; padding: 2px 10px; border-radius: 4px;
                    background: {{ entry.color_hex }}; color: #fff; font-weight: 600; font-size: 12px;
                    {% if entry.level == 'yellow' %}color: #333;{% endif %}
                ">{{ entry.label }}</span>
            </td>
            <td style="padding: 8px;">{{ entry.set_by }}</td>
            <td style="padding: 8px;">{{ entry.set_at }}</td>
            <td style="padding: 8px; color: #666;">{{ entry.note or '—' }}</td>
        </tr>
        {% endfor %}
        {% if not history %}
        <tr><td colspan="4" style="padding: 12px; color: #999; text-align: center;">No history.</td></tr>
        {% endif %}
    </tbody>
</table>
