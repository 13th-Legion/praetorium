{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="profile-layout" style="display:flex; justify-content:center;">
    <div style="width: 100%; max-width: 600px;">
        <h1 style="margin-bottom: 24px;">Settings</h1>

        <!-- Security & Login -->
        <div class="card card-pii" style="border-color: rgba(212,165,55,0.2);">
            <h3 class="card-title">🔒 Security & Login</h3>
            <div class="card-body">
                <p class="text-muted" style="margin-bottom: 1rem; font-size: 0.85rem;">Manage your portal password and two-factor authentication.</p>
                
                <div style="margin-bottom: 1.5rem;">
                    <a href="https://cloud.13thlegion.org/settings/user/security" target="_blank" style="padding:6px 12px;background:rgba(212,165,55,0.15);color:#d4a537;border:1px solid rgba(212,165,55,0.3);border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;">
                        Set Up 2FA ↗
                    </a>
                    <div class="text-muted" style="font-size: 0.75rem; margin-top: 6px;">Opens identity settings in a new tab to scan the authenticator QR code.</div>
                </div>

                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 15px 0;">

                <div id="password-form-container">
                    <button onclick="document.getElementById('pwd-form').style.display='block'; this.style.display='none';" style="padding:6px 12px;background:rgba(255,255,255,0.05);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;">
                        Change Password
                    </button>
                    
                    <form id="pwd-form" hx-post="/api/profile/change-password" hx-target="#pwd-result" style="display: none; margin-top: 0.5rem;">
                        <div style="margin-bottom: 10px;">
                            <label style="display: block; font-size: 0.8rem; color: #888; margin-bottom:4px;">New Password</label>
                            <input type="password" name="new_password" class="edit-input" required minlength="8" style="width: 100%; padding:6px; border:1px solid #333; background:#111; color:#fff; border-radius:4px;">
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; font-size: 0.8rem; color: #888; margin-bottom:4px;">Confirm Password</label>
                            <input type="password" name="confirm_password" class="edit-input" required minlength="8" style="width: 100%; padding:6px; border:1px solid #333; background:#111; color:#fff; border-radius:4px;">
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button hx-disabled-elt="this" type="submit" style="padding:6px 12px;background:#d4a537;color:#111;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;">Save</button>
                            <button type="button" onclick="document.getElementById('pwd-form').style.display='none'; document.querySelector('#password-form-container > button').style.display='block'; document.getElementById('pwd-result').innerHTML='';" style="padding:6px 12px;background:rgba(255,255,255,0.05);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;">Cancel</button>
                        </div>
                        <div id="pwd-result" style="margin-top: 15px; font-weight: 500; font-size: 0.85rem;"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
